# Agents-Memory — 向量数据库 docker-compose
#
# 本地已有 PostgreSQL，这里只加 Qdrant（向量搜索）。
# 用于多 Agent / 多机器共享记忆场景，单机使用 LanceDB（无需 Docker）。
#
# 启动：
#   cd docker && docker-compose up -d
# 停止：
#   cd docker && docker-compose down
# 数据清除：
#   cd docker && docker-compose down -v

version: "3.9"

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Qdrant — 高性能向量数据库，提供 REST + gRPC API 和 Web Dashboard
  # 用途：agents-memory 记录量超过 200 条后的共享语义搜索后端
  # ──────────────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: agents-memory-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"   # REST API + Web UI
      - "${QDRANT_GRPC_PORT:-6334}:6334"   # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      # 生产环境建议设置 API Key
      # - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  qdrant_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/qdrant

networks:
  default:
    name: agents-memory-net

# Agents-Memory — 向量数据库 + 本地 LLM docker-compose
#
# 本地已有 PostgreSQL，这里添加：
#   - Qdrant（向量搜索，多 Agent 共享）
#   - Ollama（本地 LLM + Embedding，免 API Key）
#
# 启动：
#   cd docker && docker-compose up -d
# 仅启动 Qdrant：
#   docker-compose up -d qdrant
# 仅启动 Ollama：
#   docker-compose up -d ollama
# 停止：
#   cd docker && docker-compose down
# 数据清除：
#   cd docker && docker-compose down -v

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Qdrant — 高性能向量数据库，提供 REST + gRPC API 和 Web Dashboard
  # 用途：agents-memory 记录量超过 200 条后的共享语义搜索后端
  # ──────────────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: agents-memory-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"   # REST API + Web UI
      - "${QDRANT_GRPC_PORT:-6334}:6334"   # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      # 生产环境建议设置 API Key
      # - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────────────────
  # Ollama — 本地 LLM 推理服务（CPU / GPU 均可）
  # 用途：
  #   1. nomic-embed-text  — 本地 Embedding（替代 OpenAI text-embedding-3-small）
  #   2. qwen2.5:7b / llama3  — wiki-compile / ingest 的本地 LLM 合成
  #
  # 首次使用后拉取模型（在容器外或通过 API）：
  #   docker exec -it agents-memory-ollama ollama pull nomic-embed-text
  #   docker exec -it agents-memory-ollama ollama pull qwen2.5:7b
  #
  # 或通过 REST API 拉取：
  #   curl http://localhost:11434/api/pull -d '{"name":"nomic-embed-text"}'
  # ──────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: agents-memory-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      # 启用 GPU 加速（可选，需要 NVIDIA Docker runtime）
      # - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  qdrant_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/qdrant
  ollama_models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/ollama

networks:
  default:
    name: agents-memory-net

{
  "id": "agent-runtime",
  "display_name": "Agent Runtime",
  "applies_to": ["agent", "runtime", "mcp"],
  "standards": [
    "standards/docs/docs-sync.instructions.md",
    "standards/python/base.instructions.md",
    "standards/planning/harness-engineering.md",
    "standards/planning/review-checklist.md"
  ],
  "templates": [
    "templates/profile/agent-runtime/docs/plans/README.example.md"
  ],
  "variables": [
    {
      "name": "python_bin",
      "description": "Preferred Python executable for project-local commands and validations.",
      "default": "python3",
      "required": false
    },
    {
      "name": "runtime_dir",
      "description": "Primary runtime directory used by the target agent project.",
      "default": "runtime",
      "required": false
    }
  ],
  "detectors": [
    {
      "id": "python_project",
      "kind": "path_exists",
      "output": "language.python",
      "config": {
        "any_of": ["pyproject.toml", "requirements.txt", "setup.py"]
      }
    },
    {
      "id": "runtime_shape",
      "kind": "path_exists",
      "output": "repo_shape.runtime",
      "config": {
        "any_of": ["runtime/", "scripts/mcp_server.py"]
      }
    }
  ],
  "overlays": [
    {
      "target": ".github/instructions/agents-memory/project-local.instructions.md",
      "template": "templates/profile/agent-runtime/project-local.instructions.example.md",
      "variables": ["python_bin", "runtime_dir"],
      "detectors": ["python_project", "runtime_shape"],
      "managed_by": "profile-render"
    }
  ],
  "commands": {
    "standards_sync": "amem standards-sync .",
    "plan_check": "amem plan-check .",
    "docs_check": "amem docs-check .",
    "doctor": "amem doctor ."
  },
  "bootstrap": {
    "create": [
      ".github/instructions/",
      "docs/",
      "runtime/"
    ]
  }
}

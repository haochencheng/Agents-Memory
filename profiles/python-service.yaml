{
  "id": "python-service",
  "display_name": "Python Service",
  "applies_to": ["backend", "fastapi", "python"],
  "standards": [
    "standards/python/base.instructions.md",
    "standards/python/tdd.instructions.md",
    "standards/python/dry.instructions.md",
    "standards/python/project-structure.instructions.md",
    "standards/docs/docs-sync.instructions.md",
    "standards/planning/harness-engineering.md",
    "standards/planning/spec-kit.md",
    "standards/planning/review-checklist.md"
  ],
  "templates": [
    "templates/profile/python-service/AGENTS.example.md",
    "templates/profile/python-service/docs-check.example.yml",
    "templates/profile/python-service/docs/plans/README.example.md"
  ],
  "commands": {
    "standards_sync": "amem standards-sync .",
    "plan_check": "amem plan-check .",
    "docs_check": "amem docs-check .",
    "doctor": "amem doctor .",
    "profile_diff": "amem profile-diff python-service ."
  },
  "bootstrap": {
    "create": [
      ".github/instructions/",
      "docs/",
      "tests/"
    ]
  }
}

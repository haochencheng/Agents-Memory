name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package
        run: python -m pip install .

      - name: Compile Python sources
        shell: bash
        run: python -m py_compile $(find agents_memory scripts tests -name '*.py' -print)

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Run docs-check
        run: python scripts/memory.py docs-check .